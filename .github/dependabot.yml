  #   directory: /projects/etl-python
  #   schedule:
  #     interval: weekly
  #
  # Go modules:
  # - package-ecosystem: gomod
  #   directory: /projects/api-go
  #   schedule:
  #     interval: weekly
  #
  # Rust (cargo):
  # - package-ecosystem: cargo
  #   directory: /projects/cli-rust
  #   schedule:
  #     interval: weekly
